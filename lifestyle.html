<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生活小物件 | 井衣衛</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/category.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
    /* 改成三欄網格排版 */
    .lifestyle-grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 平分三格 */
        gap: 30px;
        margin-top: 50px;
        max-width: 1200px;
        margin-left: auto;
        margin-right: auto;
    }

    .lifestyle-section {
        /* 移除原本的 flex: 1，交給 grid 處理 */
        width: 100%;
    }

    .section-title {
        color: var(--gold-primary);
        border-bottom: 1px solid var(--gold-primary);
        padding-bottom: 10px;
        margin-bottom: 25px;
        text-align: center;
        font-size: 20px; /* 稍微縮小字體以適應三欄 */
        letter-spacing: 2px;
    }

    /* 讓內層商品也變單欄大圖顯示 */
    .product-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
    }
</style>
</head>
<body>

    <!-- 導覽列 -->
    <header id="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo"><img src="./img/Logo_topl (1).png"></a>
            <ul class="nav-menu">
            <li class="dropdown">
                <a href="#">商品 <span>▼</span></a>
                <ul class="dropdown-menu">
                    <li><a href="category.html">穿搭類 (文化的鎧甲)</a></li>
                    <li><a href="bags.html">包袋類 (記憶的載體)</a></li>
                    <li><a href="lifestyle.html">生活小物件</a></li>
                    <li><a href="#">居家裝飾</a></li>
                </ul>
            </li>
            <li class="dropdown">
                <a href="#">關於井衣衛 <span>▼</span></a>
                <ul class="dropdown-menu">
                    <li><a href="#">水井村鑿井故事</a></li>
                    <li><a href="#">永續再生理念</a></li>
                    <li><a href="#">我們的團隊</a></li>
                </ul>
            </li>
            <li><a href="#">聯絡我們</a></li>
        </ul>
        </div>
    </header>
        </div>
    </header>

    <main class="category-main">
    <h1 class="page-title">生活小物件 <small>日常的溫度</small></h1>

    <!-- ★ 1. 檢查這行：有沒有這個 class 名稱？ -->
    <div class="lifestyle-grid-container">
        
        <section class="lifestyle-section">
            <h2 class="section-title">紀念吊飾 <small>CHARMS</small></h2>
            <div class="product-grid" id="charm-group"></div>
        </section>

        <section class="lifestyle-section">
            <h2 class="section-title">手工錢包 <small>WALLETS</small></h2>
            <div class="product-grid" id="wallet-group"></div>
        </section>

        <section class="lifestyle-section">
            <h2 class="section-title">品牌玩偶 <small>DOLLS</small></h2>
            <div class="product-grid" id="doll-group"></div>
        </section>

    </div>
</main>

    <script src="./js/script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            fetch('products.json')
                .then(response => response.json())
                .then(data => {
                    const charmGroup = document.getElementById('charm-group');
                    const walletGroup = document.getElementById('wallet-group'); // 新增
                    const dollGroup = document.getElementById('doll-group');

                    Object.keys(data).forEach(id => {
                        const p = data[id];
                        if (p.category === 'lifestyle') {
                            const itemHTML = `
                                <a href="product.html?id=${id}" class="category-item">
                                    <div class="item-card">
                                        <div class="item-img-box">
                                            <img src="${p.mainImg}" alt="${p.name}">
                                        </div>
                                        <div class="item-info">
                                            <h3>${p.name}</h3>
                                            <p class="item-price" style="color: #888; font-size: 13px;">${p.description || ''}</p>
                                        </div>
                                    </div>
                                </a>
                            `;

                            // 根據 subCategory 填入對應區塊
                            if (p.subCategory === 'charm') {
                                charmGroup.innerHTML += itemHTML;
                            } else if (p.subCategory === 'wallet') {
                                walletGroup.innerHTML += itemHTML; // 新增
                            } else if (p.subCategory === 'doll') {
                                dollGroup.innerHTML += itemHTML;
                            }
                        }
                    });
                });
        });
    </script>
    <footer class="site-footer">
        <div class="footer-container">
            <div class="footer-info">
                <p>&copy; 2026 井衣衛 JING YI WEI. 雲林水井村在地文化與永續衣著再生計畫</p>
            </div>
            <div class="footer-social">
                <span>追蹤我們：</span>
                <!-- ★ 請把下面的連結換成你們真正的 IG 網址 ★ -->
                <a href="https://www.instagram.com/jingyiwei_official" target="_blank" class="ig-icon">
                    <i class="fa-brands fa-instagram"></i> <!-- 這裡用 fa-brands 會更精準 -->
                </a>
            </div>
        </div>
    </footer>
</body>
</html>
